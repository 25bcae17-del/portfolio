# ================================================
# GitHub Actions CI/CD Pipeline — Simplified
# ================================================

name: CI/CD Pipeline — Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ---- JOB 1: Check Files Exist ----
  lint:
    name: Check Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f index.html && echo "✓ index.html found" || (echo "✗ index.html missing!" && exit 1)
          test -f style.css  && echo "✓ style.css found"  || (echo "✗ style.css missing!"  && exit 1)
          test -f script.js  && echo "✓ script.js found"  || (echo "✗ script.js missing!"  && exit 1)
          echo "✓ All files present!"

  # ---- JOB 2: Deploy to GitHub Pages ----
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,backend,*.md'

      - name: Done!
        run: echo "🚀 Deployed successfully to GitHub Pages!"
